name: CI

on:
  pull_request:

jobs:
  run_ci:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: "true"
          cache-directories: |
            components/http-wrapper/target
            components/logs-writer/target
            components/logs-writer/test-component/target
            components/utilities/data-api/target
            components/utilities/data-api/test-component/target
            components/utilities/crud/target
            components/utilities/log-to-stdout/target

      - name: Install stable Rust toolchain
        # uses: dtolnay/rust-toolchain@stable
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: wasm32-wasip2
          components: clippy, rustfmt

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: taiki-e/install-action@v2
        with:
          tool: just, wash, wkg

      - name: Run component linting
        run: |
          just lint-all

      - name: Check formatting
        run: |
          just format-ci

      - name: Run component builds
        run: |
          just build-all

      - name: Run component clippy checks
        run: |
          just clippy-all

      - name: Run component tests
        run: |
          just test-all

      - name: Run component integration tests
        run: |
          for justfile in $(find components helper providers integration-test -name Justfile 2>/dev/null); do
            echo "--- Running integration tests in $(dirname "$justfile") ---"
            (cd "$(dirname "$justfile")" && just integration-test)
          done
