name: Publish WASM Components to GitHub Packages
run-name: Publish to ${{ github.event_name == 'workflow_dispatch' && inputs.registry || 'ghcr.io' }} ${{ github.event_name == 'workflow_run' && '(auto)' || '' }}

on:
  workflow_run:
    workflows: ["Build WASM Components"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (leave empty to use latest tag)"
        required: false
        type: string
      registry:
        description: "Registry to publish to"
        required: false
        default: "ghcr.io"
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    # Only run if workflow_run succeeded or if manually triggered
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ${{ github.event_name == 'workflow_dispatch' && inputs.registry || 'ghcr.io' }}
      REPO_OWNER: ${{ github.repository_owner }}
      # Component registry — add new components here (name|build_path)
      COMPONENTS: |
        crud-component|components/utilities/crud/build/crud_component.wasm
        data-api-component|components/utilities/data-api/build/data_api_component.wasm
        http-wrapper|components/http-wrapper/build/http_wrapper.wasm
        log-to-stdout|target/wasm32-wasip2/release/log_to_stdout.wasm
        logs-writer|components/logs-writer/build/logs_writer.wasm

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "Using provided version: ${{ inputs.version }}"
            echo "INPUT_VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          else
            LATEST_TAG=$(git describe --tags --abbrev=0)
            echo "Using latest tag: $LATEST_TAG"
            echo "INPUT_VERSION=$LATEST_TAG" >> $GITHUB_ENV
          fi

      - uses: taiki-e/install-action@v2
        with:
          tool: wash

      - name: Prepare environment
        run: |
          # Set VERSION based on event type
          VERSION="${INPUT_VERSION}"

          # Remove 'v' prefix from version if present
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          # Convert repository owner to lowercase for ghcr.io
          REPO_OWNER=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')
          echo "REPO_OWNER=$REPO_OWNER" >> $GITHUB_ENV

          echo "Publishing version: $VERSION"
          echo "Publishing to: $REGISTRY/$REPO_OWNER"

      - name: Download artifacts from workflow run
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: release.yaml
          name: wasm-components-v${{ env.VERSION }}
          path: ./artifacts
          if_no_artifact_found: fail

      - name: Organize artifacts
        run: |
          if [ -d artifacts/components ]; then
            cp -r artifacts/components/* components/ 2>/dev/null || true
          fi
          if [ -d artifacts/target ]; then
            cp -r artifacts/target/* target/ 2>/dev/null || true
          fi

      - name: Publish components to registry
        run: |
          EXIT_CODE=0
          while IFS='|' read -r name path; do
            [ -z "$name" ] && continue
            if [ ! -f "$path" ]; then
              echo "::warning::Skipped $name (artifact not found at $path)"
              continue
            fi
            IMAGE_NAME="$REGISTRY/$REPO_OWNER/$name"
            wash push \
              --user ${{ github.actor }} \
              --password ${{ secrets.GITHUB_TOKEN }} \
              ${IMAGE_NAME}:${VERSION} \
              ./$path || EXIT_CODE=1
            wash push \
              --user ${{ github.actor }} \
              --password ${{ secrets.GITHUB_TOKEN }} \
              --allow-latest \
              ${IMAGE_NAME}:latest \
              ./$path || EXIT_CODE=1
            echo "Published: ${IMAGE_NAME}:${VERSION}"
          done <<< "$COMPONENTS"
          exit $EXIT_CODE

      - name: Summary
        if: always()
        run: |
          echo "## Published Components to GitHub Packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${REGISTRY}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          while IFS='|' read -r name path; do
            [ -z "$name" ] && continue
            IMAGE_NAME="$REGISTRY/$REPO_OWNER/$name"
            if [ -f "$path" ]; then
              echo "- **$name**" >> $GITHUB_STEP_SUMMARY
              echo "  - \`${IMAGE_NAME}:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
              echo "  - \`${IMAGE_NAME}:latest\`" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ~$name~ (skipped)" >> $GITHUB_STEP_SUMMARY
            fi
          done <<< "$COMPONENTS"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### View Packages" >> $GITHUB_STEP_SUMMARY
          echo "Visit: [GitHub Packages](https://github.com/orgs/${REPO_OWNER}/packages)" >> $GITHUB_STEP_SUMMARY
