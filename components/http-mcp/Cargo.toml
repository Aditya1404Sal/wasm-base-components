[package]
name = "mcp-component"
edition = "2021"
version = "0.1.0"

[workspace]

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.51"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rust-mcp-schema = "=0.9.5"
jsonschema = { version = "0.28", default-features = false }

[dev-dependencies]
wash-runtime = { git = "https://github.com/wasmcloud/wash", branch = "main" }
tokio = { version = "1.48.0", features = ["rt", "macros"] }
reqwest = { version = "0.12.24", default-features = false, features = ["json"] }
anyhow = "1.0"
jsonwebtoken = "9.3"
bytes = "1"
semver = "1.0.27"
uuid = { version = "1.8.0", features = ["v4"] }
